<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none">
  <!-- Light mode: navy/dark blue marks on transparent background -->

  <!-- Outer orbital ring -->
  <circle cx="60" cy="62" r="46" stroke="#1a3a6b" stroke-width="3.5" stroke-linecap="round"
    stroke-dasharray="230 60" stroke-dashoffset="-15" opacity="0.3"/>

  <!-- Inner orbital ring -->
  <circle cx="60" cy="62" r="34" stroke="#1a3a6b" stroke-width="2" stroke-linecap="round"
    stroke-dasharray="140 74" stroke-dashoffset="30" opacity="0.18"/>

  <!-- Left page -->
  <path d="M28 32 L28 78 Q28 90 42 90 L58 90 L58 32 Z"
    fill="#1e4db7" opacity="0.12"/>
  <path d="M28 32 L28 78 Q28 90 42 90 L58 90 L58 32 Z"
    stroke="#1e4db7" stroke-width="2.5" stroke-linejoin="round" fill="none"/>

  <!-- Right page -->
  <path d="M92 32 L92 78 Q92 90 78 90 L62 90 L62 32 Z"
    fill="#1e4db7" opacity="0.12"/>
  <path d="M92 32 L92 78 Q92 90 78 90 L62 90 L62 32 Z"
    stroke="#1e4db7" stroke-width="2.5" stroke-linejoin="round" fill="none"/>

  <!-- Spine connector top -->
  <line x1="28" y1="32" x2="92" y2="32" stroke="#1e4db7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center spine -->
  <line x1="60" y1="32" x2="60" y2="90" stroke="#1e4db7" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Beacon dot -->
  <circle cx="60" cy="18" r="5.5" fill="#1e4db7"/>
  <circle cx="60" cy="18" r="9" stroke="#1e4db7" stroke-width="1.5" opacity="0.25"/>

  <!-- Connector -->
  <line x1="60" y1="23.5" x2="60" y2="32" stroke="#1e4db7" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Page lines left -->
  <line x1="35" y1="48" x2="55" y2="48" stroke="#1e4db7" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="35" y1="56" x2="55" y2="56" stroke="#1e4db7" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="35" y1="64" x2="55" y2="64" stroke="#1e4db7" stroke-width="1" opacity="0.2" stroke-linecap="round"/>

  <!-- Page lines right -->
  <line x1="65" y1="48" x2="85" y2="48" stroke="#1e4db7" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="65" y1="56" x2="85" y2="56" stroke="#1e4db7" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="65" y1="64" x2="85" y2="64" stroke="#1e4db7" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
</svg>
